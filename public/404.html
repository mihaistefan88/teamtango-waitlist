<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | TeamTango</title>
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#f8fcff">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link href="https://fonts.bunny.net/css?family=inter:400,500,600,700" rel="stylesheet">
    <style>
        :root {
            --orange-400: #fba468;
            --orange-500: #f97316;
            --slate-200: #eef2f6;
            --slate-500: #7b8798;
            --slate-600: #5b6273;
            --slate-900: #0f172b;
            --radius: 1.25rem;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
            background-image: linear-gradient(to bottom, #f8fcff 0%, #edf3fa 100%);
            background-attachment: fixed;
            color: var(--slate-900);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.25rem;
        }
        .card {
            background-color: white;
            border: 1px solid var(--slate-200);
            border-radius: var(--radius);
            padding: 3rem 2.5rem;
            text-align: center;
            max-width: 26rem;
        }
        .code {
            font-size: 3rem;
            font-weight: 700;
            color: var(--orange-400);
            line-height: 1;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        p {
            font-size: 0.9375rem;
            color: var(--slate-500);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .button {
            display: inline-flex;
            padding: 0.75rem 2rem;
            font-size: 1rem;
            font-weight: 500;
            color: white;
            background-color: var(--orange-400);
            border-radius: var(--radius);
            text-decoration: none;
            transition: background-color 200ms ease;
        }
        .button:hover { background-color: var(--orange-500); }
        .links { margin-top: 1.25rem; font-size: 0.875rem; }
        .links a { color: var(--slate-600); }
    </style>
</head>
<body>
    <main class="card">
        <div class="code">404</div>
        <h1>This page wandered off</h1>
        <p>The page you're looking for doesn't exist — maybe it's on the roadmap.</p>
        <a class="button" href="/">Back to TeamTango</a>
        <p class="links"><a href="/roadmap">Roadmap</a> &middot; <a href="/changelog">Changelog</a></p>
    </main>
</body>
</html>
